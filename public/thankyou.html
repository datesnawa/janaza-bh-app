<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شكراً</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&family=Noto+Sans+Arabic:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root { --green-deep: #1a3a2a; --green-mid: #2d5a3d; --cream: #f5f0e8; --cream-dark: #e8d8c0; --gold-light: #e8c97a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--green-deep); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 30% 30%, rgba(74,140,92,0.15) 0%, transparent 60%), radial-gradient(ellipse at 70% 70%, rgba(201,168,76,0.08) 0%, transparent 50%); pointer-events: none; }
    .card { background: var(--cream); border-radius: 24px; padding: 48px 32px; max-width: 400px; width: 100%; text-align: center; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; position: relative; }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-family: 'Noto Naskh Arabic', serif; font-size: 26px; color: var(--green-deep); margin-bottom: 12px; }
    p { font-size: 14px; color: #555; line-height: 1.7; font-family: 'Noto Naskh Arabic', serif; }
    .ayah { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--cream-dark); font-family: 'Noto Naskh Arabic', serif; font-size: 16px; color: var(--green-mid); line-height: 1.8; }
    .back-btn { display: inline-block; margin-top: 24px; padding: 10px 28px; background: var(--green-mid); color: var(--cream); border-radius: 20px; font-family: 'Noto Naskh Arabic', serif; font-size: 14px; text-decoration: none; transition: background 0.2s; }
    .back-btn:hover { background: var(--green-deep); }
    @keyframes pop { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">✅</div>
    <h1 id="title">جزاك الله خيراً</h1>
    <p id="msg">تم تسجيلك بنجاح. ستصلك إشعارات صلاة الجنازة على رقمك عبر واتساب.</p>
    <div class="ayah" id="ayah">إِنَّ اللَّهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ</div>
    <a href="/register.html" class="back-btn" id="backBtn">العودة للرئيسية</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const type = params.get('type');
    const lang = params.get('lang') || 'ar';
    const isArabic = lang !== 'en';
    document.documentElement.lang = isArabic ? 'ar' : 'en';
    document.documentElement.dir = isArabic ? 'rtl' : 'ltr';
    if (type === 'notify') {
      document.getElementById('icon').textContent = '🕌';
      document.getElementById('title').textContent = isArabic ? 'تم الإرسال بنجاح' : 'Submitted Successfully';
      document.getElementById('msg').textContent = isArabic ? 'تم استلام إشعار الوفاة. سيتم مراجعته والإرسال للمشتركين بإذن الله في أقرب وقت.' : "The Janaza notification has been received. It will be reviewed and sent to subscribers as soon as possible, insha'Allah.";
      document.getElementById('ayah').textContent = 'إِنَّا لِلَّهِ وَإِنَّا إِلَيْهِ رَاجِعُونَ';
      document.getElementById('backBtn').href = '/notify.html';
      document.getElementById('backBtn').textContent = isArabic ? 'العودة' : 'Go Back';
    } else {
      document.getElementById('title').textContent = isArabic ? 'جزاك الله خيراً' : 'JazakAllah Khayran';
      document.getElementById('msg').textContent = isArabic ? 'تم تسجيلك بنجاح. ستصلك إشعارات صلاة الجنازة على رقمك عبر واتساب.' : 'You have been registered successfully. You will receive Janaza prayer notifications on your WhatsApp number.';
      document.getElementById('ayah').textContent = isArabic ? 'إِنَّ اللَّهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ' : 'May Allah have mercy on the deceased and grant them Jannah.';
      document.getElementById('backBtn').href = '/register.html';
      document.getElementById('backBtn').textContent = isArabic ? 'العودة للرئيسية' : 'Back to Home';
    }
  </script>
</body>
</html>
